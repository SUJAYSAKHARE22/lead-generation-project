    <div style="margin-top:auto; padding-top:20px; border-top:1px solid var(--glass-border); margin-top:24px;">
        <a href="#" onclick="document.getElementById('logoutModal').style.display='flex'; return false;"
           style="color:var(--red)!important;">
            <i class="fas fa-sign-out-alt" style="color:var(--red)!important;"></i> Logout
        </a>
    </div>
</div>

<!-- Logout Confirmation Modal -->
<div id="logoutModal" style="
  position:fixed; inset:0; background:rgba(0,0,0,0.7);
  backdrop-filter:blur(8px);
  display:none; justify-content:center; align-items:center; z-index:9999;">
  <div style="
    background:var(--card-solid);
    backdrop-filter:blur(24px);
    border:1px solid var(--glass-border);
    padding:32px 28px; border-radius:20px;
    width:340px; text-align:center; color:var(--text);
    box-shadow:0 30px 60px rgba(0,0,0,0.5);">
    <div style="width:52px;height:52px;background:rgba(255,92,124,0.15);border-radius:50%;
        display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:22px;">
        👋
    </div>
    <h3 style="font-family:'Syne',sans-serif;margin-bottom:8px;font-size:18px;">Log Out</h3>
    <p style="color:var(--text2); margin-bottom:24px;font-size:14px;">Are you sure you want to end your session?</p>
    <div style="display:flex; gap:10px; justify-content:center;">
      <a href="/logout" style="
        background:var(--red); padding:11px 22px;
        border-radius:12px; color:white; cursor:pointer; text-decoration:none;
        font-size:14px; font-weight:600;">
        Yes, Logout
      </a>
      <button onclick="document.getElementById('logoutModal').style.display='none'" style="
        background:var(--glass); border:1px solid var(--glass-border);
        padding:11px 22px; border-radius:12px; color:var(--text);
        cursor:pointer; font-size:14px; font-weight:600;">
        Stay
      </button>
    </div>
  </div>
</div>
