<!-- Logout Confirmation Modal -->
<div id="logoutModal" style="
  position:fixed; inset:0; background:rgba(0,0,0,0.6);
  display:none; justify-content:center; align-items:center; z-index:9999;">
  <div style="
    background:#1e293b; padding:25px; border-radius:14px;
    width:320px; text-align:center; color:white;
    box-shadow:0 20px 40px rgba(0,0,0,0.5);">
    <h3 style="margin-bottom:10px;">Log Out</h3>
    <p style="color:#94a3b8; margin-bottom:20px;">Are you sure you want to log out?</p>
    <div style="display:flex; gap:10px; justify-content:center;">
      <a href="/logout" style="
        background:#ef4444; padding:10px 18px;
        border-radius:8px; color:white; cursor:pointer; text-decoration:none;">
        Yes, Logout
      </a>
      <button onclick="document.getElementById('logoutModal').style.display='none'" style="
        background:#475569; border:none; padding:10px 18px;
        border-radius:8px; color:white; cursor:pointer;">
        No, Stay
      </button>
    </div>
  </div>
</div>
