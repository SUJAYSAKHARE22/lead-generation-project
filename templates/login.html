<!DOCTYPE html>
<html>
<head>
<title>Login | Gen6</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e293b);
overflow:hidden;
}

/* Glass Card */
.login-card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.1);
padding:50px 40px;
border-radius:28px;
width:400px;
text-align:center;
color:white;
box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

.brand{
font-size:14px;
letter-spacing:4px;
text-transform:uppercase;
color:#818cf8;
font-weight:700;
margin-bottom:10px;
}

h1{
font-size:32px;
margin-bottom:10px;
}

.sub{
color:#94a3b8;
margin-bottom:30px;
font-size:14px;
}

input{
width:100%;
padding:14px;
margin-bottom:18px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.2);
background:rgba(255,255,255,0.05);
color:white;
outline:none;
transition:0.3s;
}

input:focus{
border-color:#6366f1;
background:rgba(255,255,255,0.1);
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#6366f1;
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
box-shadow:0 10px 30px rgba(99,102,241,0.4);
}

button:hover{
background:#4f46e5;
transform:translateY(-2px);
}

.footer{
margin-top:20px;
font-size:12px;
color:#94a3b8;
}
</style>
</head>

<body>

<div class="login-card">

<div class="brand">TARS TECHNOLOGIES</div>
<h1>Gen6</h1>
<p class="sub">Next-Gen AI Lead Intelligence Platform</p>

<form method="POST" onsubmit="return validateCaptcha()">

<input type="email" name="username" placeholder="Personal Email" required>

<input type="password" name="password" placeholder="Password" required>

<!-- CAPTCHA DISPLAY -->

<div style="
background:rgba(255,255,255,0.1);
padding:10px;
border-radius:10px;
margin-bottom:10px;
font-size:20px;
letter-spacing:4px;
font-weight:600;
color:#818cf8;
" id="captchaBox"></div>

<input type="text" id="captchaInput" placeholder="Enter Captcha" required>

<button type="submit">Access Dashboard</button>

</form>

<div style="margin-top:18px;font-size:13px;color:#94a3b8;">
Don't have an account?
<a href="/signup" style="color:#818cf8;text-decoration:none;font-weight:600;">
Create one
</a>
</div>


<div class="footer">
Secure Encrypted Access
</div>

</div>

<script>

let captchaText = "";

function generateCaptcha(){

let chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";

captchaText = "";

for(let i=0;i<5;i++){

captchaText += chars.charAt(Math.floor(Math.random()*chars.length));

}

document.getElementById("captchaBox").innerText = captchaText;

}

function validateCaptcha(){

let userCaptcha = document.getElementById("captchaInput").value;

if(userCaptcha !== captchaText){

alert("Incorrect captcha");

generateCaptcha();

return false;

}

return true;

}

generateCaptcha();

</script>
</body>
</html>
