<!DOCTYPE html>
<html>
<head>
<title>Login | LeadPilotGen6</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:'DM Sans',sans-serif; }

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#060c1a;
    overflow:hidden;
    position:relative;
}

/* Mesh background */
body::before{
    content:'';
    position:fixed;
    inset:0;
    background:
        radial-gradient(ellipse 70% 60% at 15% 5%, rgba(92,111,255,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 85% 90%, rgba(34,211,165,0.12) 0%, transparent 50%),
        radial-gradient(ellipse 40% 35% at 70% 20%, rgba(255,92,124,0.08) 0%, transparent 50%);
    pointer-events:none;
}

/* Floating orbs */
.orb{
    position:fixed;
    border-radius:50%;
    filter:blur(80px);
    animation:drift 8s ease-in-out infinite alternate;
    pointer-events:none;
}
.orb1{ width:400px;height:400px;background:rgba(92,111,255,0.1);top:-100px;left:-100px; }
.orb2{ width:300px;height:300px;background:rgba(34,211,165,0.08);bottom:-80px;right:-80px;animation-delay:3s; }

@keyframes drift{
    from{ transform:translate(0,0) scale(1); }
    to{ transform:translate(30px,20px) scale(1.05); }
}

.card{
    background:rgba(255,255,255,0.04);
    backdrop-filter:blur(32px);
    -webkit-backdrop-filter:blur(32px);
    border:1px solid rgba(255,255,255,0.1);
    padding:48px 40px;
    border-radius:28px;
    width:420px;
    text-align:center;
    color:white;
    box-shadow:
        0 30px 60px rgba(0,0,0,0.5),
        0 0 0 1px rgba(255,255,255,0.05) inset,
        0 1px 0 rgba(255,255,255,0.1) inset;
    position:relative;
    z-index:1;
    animation:cardIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
}

@keyframes cardIn{
    from{ opacity:0; transform:translateY(40px) scale(0.95); }
    to{ opacity:1; transform:translateY(0) scale(1); }
}

.brand{
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-size:11px;
    letter-spacing:3px;
    text-transform:uppercase;
    color:#7c8fff;
    font-weight:700;
    margin-bottom:20px;
    background:rgba(92,111,255,0.1);
    padding:6px 14px;
    border-radius:20px;
    border:1px solid rgba(92,111,255,0.2);
}

h1{
    font-family:'Syne',sans-serif;
    font-size:34px;
    font-weight:800;
    margin-bottom:6px;
    background:linear-gradient(135deg,#fff 40%,#7c8fff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
}

.sub{
    color:#8899bb;
    margin-bottom:36px;
    font-size:14px;
}

.input-group{
    position:relative;
    margin-bottom:16px;
    text-align:left;
}

.input-group i{
    position:absolute;
    left:16px;
    top:50%;
    transform:translateY(-50%);
    color:#5c6fff;
    font-size:14px;
    z-index:1;
}

input{
    width:100%;
    padding:14px 16px 14px 44px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,0.1);
    background:rgba(255,255,255,0.06);
    color:white;
    outline:none;
    transition:all 0.25s;
    font-size:14px;
    font-family:'DM Sans',sans-serif;
}

input::placeholder{ color:#4a5a7a; }

input:focus{
    border-color:rgba(92,111,255,0.5);
    background:rgba(92,111,255,0.08);
    box-shadow:0 0 0 3px rgba(92,111,255,0.15);
}

/* Captcha box */
.captcha-box{
    background:rgba(92,111,255,0.08);
    border:1px solid rgba(92,111,255,0.2);
    padding:14px;
    border-radius:14px;
    margin-bottom:12px;
    font-size:22px;
    letter-spacing:8px;
    font-weight:800;
    font-family:'Syne',sans-serif;
    color:#7c8fff;
    cursor:pointer;
    user-select:none;
    transition:all 0.2s;
    position:relative;
}

.captcha-box:hover{
    background:rgba(92,111,255,0.12);
}

.captcha-box::after{
    content:'↻ click to refresh';
    position:absolute;
    right:12px;
    top:50%;
    transform:translateY(-50%);
    font-size:10px;
    letter-spacing:0.5px;
    color:#5a6a8a;
    font-family:'DM Sans',sans-serif;
}

button[type=submit]{
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#5c6fff,#22d3a5);
    color:white;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
    transition:all 0.25s;
    box-shadow:0 8px 25px rgba(92,111,255,0.35);
    margin-top:6px;
    font-family:'Syne',sans-serif;
    letter-spacing:0.5px;
}

button[type=submit]:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 35px rgba(92,111,255,0.5);
}

button[type=submit]:active{ transform:translateY(0); }

.footer-link{
    margin-top:24px;
    font-size:13px;
    color:#8899bb;
}

.footer-link a{
    color:#7c8fff;
    text-decoration:none;
    font-weight:600;
    transition:color 0.2s;
}

.footer-link a:hover{ color:#a5b4fc; }

.secure-badge{
    margin-top:20px;
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:11px;
    color:#4a5a7a;
}
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="card">

    <div class="brand">
        <i class="fas fa-rocket"></i>
        TARS TECHNOLOGIES
    </div>

    <h1>LeadPilotGen6</h1>
    <p class="sub">Next-Gen AI Lead Intelligence Platform</p>

    <form method="POST" onsubmit="return validateCaptcha()">

        <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" name="username" placeholder="Personal Email" required>
        </div>

        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" name="password" placeholder="Password" required>
        </div>

        <div class="captcha-box" id="captchaBox" onclick="generateCaptcha()"></div>

        <div class="input-group">
            <i class="fas fa-shield-alt"></i>
            <input type="text" id="captchaInput" placeholder="Enter captcha above" required>
        </div>

        <button type="submit">
            <i class="fas fa-arrow-right" style="margin-right:8px;"></i>
            Access Dashboard
        </button>

    </form>

    <div class="footer-link">
        Don't have an account?
        <a href="/signup">Create one →</a>
    </div>

    <div class="secure-badge">
        <i class="fas fa-lock"></i>
        Encrypted & Secure Access
    </div>

</div>

<script>
let captchaText = "";

function generateCaptcha(){
    let chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    captchaText = "";
    for(let i=0;i<5;i++){
        captchaText += chars.charAt(Math.floor(Math.random()*chars.length));
    }
    document.getElementById("captchaBox").innerText = captchaText;
}

function validateCaptcha(){
    let userCaptcha = document.getElementById("captchaInput").value;
    if(userCaptcha !== captchaText){
        alert("Incorrect captcha — please try again.");
        generateCaptcha();
        return false;
    }
    return true;
}

generateCaptcha();
</script>
</body>
</html>
