<!DOCTYPE html>
<html>
<head>

<title>LeadPilotGen6 Signup</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
}

/* CARD */

.card{

background:rgba(255,255,255,0.05);
padding:50px 40px;
border-radius:25px;
width:420px;

backdrop-filter:blur(20px);

box-shadow:
0 25px 60px rgba(0,0,0,0.6),
inset 0 1px 0 rgba(255,255,255,0.08);

border:1px solid rgba(255,255,255,0.08);

text-align:center;

}

/* HEADER */

.brand{
letter-spacing:4px;
font-size:13px;
color:#8b93ff;
margin-bottom:10px;
}

.title{
font-size:36px;
font-weight:700;
margin-bottom:8px;
}

.subtitle{
color:#94a3b8;
margin-bottom:30px;
font-size:15px;
}

/* INPUT */

input{

width:100%;
padding:15px;
margin-bottom:18px;

border-radius:14px;
border:1px solid rgba(255,255,255,0.1);

background:rgba(255,255,255,0.06);
color:white;

font-size:14px;

outline:none;
transition:0.3s;

}

input:focus{

border-color:#6366f1;
box-shadow:0 0 0 2px rgba(99,102,241,0.3);

}

/* BUTTON */

button{

width:100%;
padding:16px;

border:none;
border-radius:14px;

background:linear-gradient(135deg,#6366f1,#7c7fff);

color:white;
font-size:16px;
font-weight:600;

cursor:pointer;

box-shadow:0 10px 30px rgba(99,102,241,0.5);

transition:0.3s;

}

button:hover{

transform:translateY(-2px);
box-shadow:0 15px 40px rgba(99,102,241,0.6);

}

/* LINKS */

.login-link{

margin-top:20px;
color:#94a3b8;

}

.login-link a{

color:#8b93ff;
text-decoration:none;
font-weight:600;

}

.login-link a:hover{

text-decoration:underline;

}

.secure{

margin-top:12px;
font-size:13px;
color:#64748b;

}

</style>

</head>

<body>

<div class="card">

<div class="brand">TARS TECHNOLOGIES</div>

<div class="title">Create Account</div>

<div class="subtitle">Join LeadPilotGen6 Platform</div>

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Create Account</button>

</form>

<div class="login-link">
Already have an account?
<a href="/">Login</a>
</div>

<div class="secure">
Secure Encrypted Access
</div>

</div>

</body>
</html>
