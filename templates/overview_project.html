{% extends "base.html" %}

{% block title %}Lead Qualification | LeadPilotGen6{% endblock %}

{% block extra_css %}
<style>
.status-buttons{
display:flex;
gap:15px;
margin-bottom:30px;
flex-wrap:wrap;
}

.status-buttons button{
padding:10px 18px;
border-radius:12px;
border:none;
cursor:pointer;
background:var(--card);
color:var(--text);
transition:0.3s;
}

.status-buttons button:hover{
background:var(--accent);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
}

.card{
background:var(--card);
padding:20px;
border-radius:18px;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
background:#263244;
}

.card h3{
margin-bottom:8px;
}

.card p{
color:var(--soft);
font-size:14px;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.modal-content{
background:var(--card);
width:600px;
max-width:90%;
padding:30px;
border-radius:20px;
position:relative;
}

.modal-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.modal-actions button{
padding:8px 14px;
border:none;
border-radius:10px;
cursor:pointer;
margin-left:10px;
}

.decline-btn{
background:#ef4444;
color:white;
}

.cta-btn{
background:#16a34a;
color:white;
}

.close-btn{
position:absolute;
top:15px;
right:20px;
cursor:pointer;
font-size:18px;
color:var(--soft);
}

.modal-details p{
margin-bottom:8px;
color:var(--soft);
}

.modal-details a{
color:var(--accent);
text-decoration:none;
}
</style>
{% endblock %}

{% block content %}
<h2 style="margin-bottom:25px;">📊 Lead Qualification</h2>

<div class="status-buttons">
<button onclick="filterStatus('declined')">❌ Declined</button>
<button onclick="filterStatus('cta')">📞 Call For Action</button>
<button onclick="filterStatus('explore')">🔍 More To Explore</button>
</div>

<div class="grid">
{% for c in companies %}
<div class="card company-card"
     data-status="{{ c[11] if c[11] else 'explore' }}"
     onclick="openPopup(
        '{{c[0]}}',
        `{{c[1]|escape}}`,
        `{{c[2]|escape}}`,
        `{{c[3]|escape}}`,
        `{{c[4]|escape}}`,
        `{{c[5]|escape}}`,
        `{{c[6]|escape}}`,
        `{{c[7]|escape}}`
     )">
<h3>{{ c[1] }}</h3>
<p>{{ c[6] }}</p>
</div>
{% endfor %}
</div>

<div id="companyModal" class="modal">
<div class="modal-content">
<div class="close-btn" onclick="closeModal()">✖</div>
<div class="modal-header">
<h3 id="modalName"></h3>
<div class="modal-actions">
<button class="decline-btn" onclick="setStatus('declined')">Decline</button>
<button class="cta-btn" onclick="setStatus('cta')">Call For Action</button>
</div>
</div>
<div class="modal-details" id="modalDetails"></div>
</div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let currentCompanyId = null;

function openPopup(id,name,website,phone,address,rating,desc,email){
    currentCompanyId = id;
    document.getElementById("modalName").innerText = name;
    document.getElementById("modalDetails").innerHTML = `
        <p><strong>Description:</strong> ${desc || "-"}</p>
        <p><strong>Address:</strong> ${address || "-"}</p>
        <p><strong>Phone:</strong> ${phone || "-"}</p>
        <p><strong>Email:</strong> ${email || "-"}</p>
        <p><strong>Rating:</strong> ${rating || "-"}</p>
        ${website ? `<p><a href="${website}" target="_blank">Visit Website</a></p>` : ""}
    `;
    document.getElementById("companyModal").style.display="flex";
}

function closeModal(){
    document.getElementById("companyModal").style.display="none";
}

function setStatus(status){
    fetch("/update_status", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: `company_id=${currentCompanyId}&status=${status}`
    }).then(()=>{
        location.reload();
    });
}

function filterStatus(status){
    const cards = document.querySelectorAll(".company-card");
    cards.forEach(card=>{
        if(status==="explore"){
            card.style.display = (card.dataset.status==="explore") ? "block" : "none";
        } else {
            card.style.display = (card.dataset.status===status) ? "block" : "none";
        }
    });
}

window.onclick=function(e){
    if(e.target.classList.contains("modal")){
        closeModal();
    }
}
</script>
{% endblock %}
