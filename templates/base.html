<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}LeadPilotGen6{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
    :root{
        /* Dark theme (default) */
        --bg:#060c1a;
        --bg2:#0a1628;
        --card:rgba(255,255,255,0.05);
        --card-solid:#0f1f38;
        --border:rgba(255,255,255,0.08);
        --text:#e8eeff;
        --text2:#8899bb;
        --accent:#5c6fff;
        --accent2:#7c8fff;
        --accent-glow:rgba(92,111,255,0.35);
        --green:#22d3a5;
        --red:#ff5c7c;
        --sidebar-bg:rgba(6,12,26,0.95);
        --glass:rgba(255,255,255,0.04);
        --glass-border:rgba(255,255,255,0.1);
        --shadow:0 8px 32px rgba(0,0,0,0.5);
        --noise:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    }

    body.light{
        --bg:#eef2ff;
        --bg2:#e4eaf8;
        --card:rgba(255,255,255,0.7);
        --card-solid:#ffffff;
        --border:rgba(92,111,255,0.12);
        --text:#111827;
        --text2:#5a6a8a;
        --accent:#5c6fff;
        --accent2:#7c8fff;
        --accent-glow:rgba(92,111,255,0.2);
        --green:#059669;
        --red:#dc2626;
        --sidebar-bg:rgba(238,242,255,0.97);
        --glass:rgba(255,255,255,0.6);
        --glass-border:rgba(92,111,255,0.15);
        --shadow:0 8px 32px rgba(92,111,255,0.1);
    }

    html{ font-size:16px; -webkit-text-size-adjust:100%; text-size-adjust:100%; }

    *{ margin:0; padding:0; box-sizing:border-box; font-family:'DM Sans',sans-serif; }

    body{
        display:flex;
        background:var(--bg);
        color:var(--text);
        min-height:100vh;
        position:relative;
        overflow-x:hidden;
    }

    /* Animated background mesh */
    body::before{
        content:'';
        position:fixed;
        inset:0;
        background:
            radial-gradient(ellipse 80% 50% at 20% 10%, rgba(92,111,255,0.12) 0%, transparent 60%),
            radial-gradient(ellipse 60% 40% at 80% 80%, rgba(34,211,165,0.08) 0%, transparent 50%),
            radial-gradient(ellipse 40% 30% at 60% 30%, rgba(255,92,124,0.06) 0%, transparent 50%);
        pointer-events:none;
        z-index:0;
    }

    body.light::before{
        background:
            radial-gradient(ellipse 80% 50% at 20% 10%, rgba(92,111,255,0.08) 0%, transparent 60%),
            radial-gradient(ellipse 60% 40% at 80% 80%, rgba(34,211,165,0.06) 0%, transparent 50%);
    }

    /* ─── SIDEBAR ─── */
    .sidebar{
        width:260px;
        min-width:260px;
        max-width:260px;
        background:var(--sidebar-bg);
        backdrop-filter:blur(24px);
        -webkit-backdrop-filter:blur(24px);
        padding:28px 16px;
        position:fixed;
        left:0; top:0;
        height:100vh;
        overflow-y:auto;
        scrollbar-gutter:stable;
        border-right:1px solid var(--glass-border);
        z-index:100;
    }

    .sidebar::-webkit-scrollbar{ width:4px; }
    .sidebar::-webkit-scrollbar-track{ background:transparent; }
    .sidebar::-webkit-scrollbar-thumb{ background:var(--border); border-radius:4px; }

    .sidebar-brand{
        display:flex;
        align-items:center;
        gap:10px;
        margin-bottom:32px;
        padding:0 8px;
    }

    .sidebar-brand-icon{
        width:36px;
        height:36px;
        background:linear-gradient(135deg,#5c6fff,#22d3a5);
        border-radius:10px;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:16px;
        flex-shrink:0;
        box-shadow:0 4px 15px var(--accent-glow);
    }

    .sidebar-brand h2{
        font-family:'Syne',sans-serif;
        font-size:15px;
        font-weight:700;
        color:var(--text);
        letter-spacing:0.3px;
    }

    .sidebar-section{
        font-size:10px;
        font-weight:600;
        letter-spacing:1.5px;
        text-transform:uppercase;
        color:var(--text2);
        padding:0 12px;
        margin:20px 0 8px;
    }

    .sidebar a{
        display:flex;
        align-items:center;
        gap:11px;
        color:var(--text2);
        padding:11px 14px;
        margin:2px 0;
        text-decoration:none;
        border-radius:12px;
        transition:all 0.2s;
        font-size:14px;
        font-weight:500;
        position:relative;
    }

    .sidebar a:visited{ color:var(--text2); }

    .sidebar a i{
        width:18px;
        text-align:center;
        font-size:13px;
        transition:all 0.2s;
    }

    .sidebar a:hover{
        background:var(--glass);
        color:var(--text);
        transform:translateX(2px);
    }

    .sidebar a.active{
        background:linear-gradient(135deg,rgba(92,111,255,0.2),rgba(92,111,255,0.08));
        color:var(--accent2);
        font-weight:600;
        border:1px solid rgba(92,111,255,0.25);
    }

    .sidebar a.active i{ color:var(--accent); }

    .sidebar a.active::before{
        content:'';
        position:absolute;
        left:0; top:50%;
        transform:translateY(-50%);
        width:3px;
        height:60%;
        background:var(--accent);
        border-radius:0 3px 3px 0;
    }

    /* ─── PAGE CONTENT ─── */
    .page-content{
        margin-left:260px;
        width:calc(100% - 260px);
        padding:36px 40px;
        position:relative;
        z-index:1;
    }

    /* ─── GLASS CARD UTILITY ─── */
    .glass-card{
        background:var(--card);
        backdrop-filter:blur(20px);
        -webkit-backdrop-filter:blur(20px);
        border:1px solid var(--glass-border);
        border-radius:18px;
        box-shadow:var(--shadow);
    }

    /* ─── PAGE HEADER ─── */
    .page-header{
        margin-bottom:32px;
    }

    .page-header h2{
        font-family:'Syne',sans-serif;
        font-size:24px;
        font-weight:700;
        color:var(--text);
    }

    .page-header p{
        color:var(--text2);
        font-size:14px;
        margin-top:4px;
    }
    </style>

    {% block extra_css %}{% endblock %}
</head>

<body>

{% include "sidebar.html" %}

<div class="page-content">
    {% block content %}{% endblock %}
</div>

{% block extra_js %}{% endblock %}

<script>
document.addEventListener("DOMContentLoaded", function () {
    const savedTheme = localStorage.getItem("theme");
    if (savedTheme === "light") {
        document.body.classList.add("light");
    }
});
</script>
</body>
</html>
