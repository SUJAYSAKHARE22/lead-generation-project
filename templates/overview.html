<!DOCTYPE html>
<html>
<head>
<title>Overview | LeadPilotGen6</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{
background:#0f172a;
color:white;
font-family:'Inter',sans-serif;
padding:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:16px;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

button{
margin-top:15px;
padding:10px 16px;
border:none;
border-radius:10px;
background:#6366f1;
color:white;
cursor:pointer;
}
</style>

</head>

<body>

<h2>📊 Project Overview</h2>

<div class="grid">
{% for p in projects %}
<div class="card">
<h3>{{ p[1] }}</h3>
<p>{{ p[2] }}</p>

<button onclick="location.href='/overview_project/{{p[0]}}'">
Open →
</button>

</div>
{% endfor %}
</div>

</body>
</html>
