{% extends "base.html" %}

{% block title %}Overview | Gen6{% endblock %}

{% block extra_css %}
<style>
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:25px;
}

.card{
    background:var(--card);
    padding:20px;
    border-radius:16px;
    transition:0.3s;
    display:flex;
    flex-direction:column;
    gap:15px;
}

/* DARK shadow */
body:not(.light) .card{
    box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

/* LIGHT shadow */
body.light .card{
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.card:hover{
    transform:translateY(-5px);
}

.project-header{
    display:flex;
    align-items:center;
    gap:15px;
}

.project-logo{
    width:50px;
    height:50px;
    border-radius:12px;
    object-fit:cover;
}

.project-info h3{
    margin:0;
    font-size:18px;
}

.project-info p{
    margin:4px 0 0;
    color:var(--soft);
    font-size:14px;
}

button{
    margin-top:auto;
    padding:10px 16px;
    border:none;
    border-radius:10px;
    background:var(--accent);
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    filter:brightness(1.1);
}

</style>
{% endblock %}

{% block content %}
<h2 style="margin-bottom:24px;">📊 Project Overview</h2>

<div class="grid">
{% for p in projects %}
<div class="card">

<div class="project-header">

{% set logo_path = 'project_logos/' ~ p[0] ~ '.png' %}

<img src="{{ url_for('static', filename=logo_path) }}"
     onerror="this.src='{{ url_for('static', filename='project_logos/default.png') }}'"
     class="project-logo">

<div class="project-info">
<h3>{{ p[1] }}</h3>
<p>{{ p[2] }}</p>
</div>

</div>

<button onclick="location.href='/overview_project/{{p[0]}}'">
Open →
</button>

</div>
{% endfor %}
</div>
{% endblock %}
